<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Registration</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    form { max-width: 400px; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 20px; padding: 10px 20px; }
    #message { margin-top: 20px; font-weight: bold; color: green; }
  </style>
</head>
<body>

  <h2>Conference Registration Form</h2>

  <form id="registrationForm">
    <label>First Name</label>
    <input type="text" name="first_name" required>

    <label>Last Name</label>
    <input type="text" name="last_name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <button type="submit">Submit</button>
  </form>

  <p id="message"></p>

  <script>
    const form = document.getElementById("registrationForm");

    form.addEventListener("submit", async function(e) {
      e.preventDefault(); // prevent page reload

      const data = {
        first_name: form.first_name.value,
        last_name: form.last_name.value,
        email: form.email.value
      };

      // Replace this with your deployed Google Apps Script Web App URL
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSSlKaYKrCCWQvUO6x1U79yze519AGmE-Q1EwaIcrtYK30DcP-EfGQUHAhLRMje3I/exec";

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const text = await response.text();

        if (text.trim() === "success") {
          document.getElementById("message").innerText =
            "Thank you! A confirmation email has been sent to " + data.email + ".";
          form.reset();
        } else {
          // Display the actual error returned by Apps Script
          document.getElementById("message").innerText =
            "Submission failed. Error from server: " + text;
        }

      } catch (err) {
        // Network/fetch-level error
        document.getElementById("message").innerText =
          "Submission failed. Fetch/network error: " + err.message;
      }
    });
  </script>

</body>
</html>
