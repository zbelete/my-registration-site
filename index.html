<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conference Registration</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    form { max-width: 400px; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 20px; padding: 10px 20px; }
    #message { margin-top: 20px; font-weight: bold; color: green; }
  </style>
</head>
<body>

  <h2>Conference Registration Form</h2>

  <form id="registrationForm">
    <label>First Name</label>
    <input type="text" name="first_name" required>

    <label>Last Name</label>
    <input type="text" name="last_name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <button type="submit">Submit</button>
  </form>

  <p id="message"></p>

  <script>
    const form = document.getElementById("registrationForm");
    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = {
        first_name: form.first_name.value,
        last_name: form.last_name.value,
        email: form.email.value
      };

      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbx2FRViASMTRMxXXSswLlIoCsTJ_RSiW4v1HaxfYlKXqlRSQBKtbK9lVg8znyTS17Gd/exec", {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const text = await response.text();
        console.log(text); // should print "success"

        document.getElementById("message").innerHTML =
          "Thank you! A confirmation email has been sent to " + data.email + ".";

        form.reset();
      } catch(err) {
        console.error(err);
        document.getElementById("message").innerText =
          "Submission failed. Please try again.";
      }
    });
  </script>

</body>
</html>
