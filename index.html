<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 15px; color: green; display: none; }
    </style>
</head>
<body>

    <h2>Join the Program</h2>
    <form id="registrationForm">
        <input type="text" name="FirstName" placeholder="First Name" required>
        <input type="text" name="LastName" placeholder="Last Name" required>
        <input type="email" name="Email" placeholder="Email Address" required>
        <button type="submit" id="submitBtn">Submit Details</button>
    </form>
    <div id="status">Submitting... Please wait.</div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwKZJc5QvwGITjgTt-x1e0RVfgq7xvrzNKu7BxgrWIKadvLiLfSqZ28L0-tylRGssZB/exec'; // <--- PASTE YOUR URL HERE
        const form = document.getElementById('registrationForm');
        const status = document.getElementById('status');

        form.addEventListener('submit', e => {
            e.preventDefault();
            status.style.display = 'block';
            status.innerText = 'Submitting...';
            
            // Send data to Google Apps Script
            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form)
            })
            .then(response => {
                status.innerText = 'Success! Check your email.';
                form.reset();
            })
            .catch(error => {
                status.innerText = 'Error! Try again later.';
                console.error('Error!', error.message);
            });
        });
    </script>

</body>
</html>
